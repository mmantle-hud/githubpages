<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">

{% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>
    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        {% if site.github.is_project_page %}
          <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.</span>
        {% endif %}
        <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
      </footer>
    </main>
   <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: true,

      theme: 'base',
      themeVariables:{
        primaryColor: '#b0dac6'
        primaryTextColor: '#000000'
        primaryBorderColor: '#159957'
        lineColor: '#000000'
        secondaryColor: '#006100'
        tertiaryColor: '#fff'
        fontFamily: 'Roboto, sans-serif'
      },

      // For ERDs specifically: bypasses theme calculators to enforce table styles globally
      themeCSS: `
        .er.entityBox { fill: #159957 !important; stroke: #ff0000 !important; }
        .er.attributeBoxOdd { fill: #00ff00 !important; }
        .er.attributeBoxEven { fill: #0000ff !important; }
      `
  });
  
  </script>
  </body>
</html>
